<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Audio Downloader</h1>
      <p>Detected audio files on this page</p>
    </header>
    
    <main>
      <div id="no-audio" class="empty-state">
        <p>No audio files detected yet.</p>
        <p class="hint">Try playing some audio on the page.</p>
      </div>
      
      <ul id="audio-list" class="audio-list hidden">
        <!-- Audio items will be injected here -->
      </ul>
    </main>

    <footer>
      <button id="download-all" class="btn primary hidden">Download All</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
